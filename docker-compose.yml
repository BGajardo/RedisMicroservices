services:

  postgres:
      image: postgres:16
      container_name: postgres-db
      restart: always

      environment:
        POSTGRES_USER: admin
        POSTGRES_PASSWORD: admin123
        POSTGRES_DB: authdb

      networks:
        - internal

      volumes:
        - postgres_data:/var/lib/postgresql/data/
        - ./init.sql:/docker-entrypoint-initdb.d/init.sql

  redis:
    image: redis:7
    container_name: redis-db
    restart: always
    networks:
      - internal
    volumes:
      - redis_data:/data


  auth-service:
    build:
      context: ./AuthService
      dockerfile: Dockerfile
    container_name: auth-service
    restart: always
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-db:5432/authdb
      SPRING_DATASOURCE_USERNAME: admin
      SPRING_DATASOURCE_PASSWORD: admin123
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
    depends_on:
      - postgres
      - redis
    networks:
      - internal

  data-service:
    build:
      context: ./DataService
      dockerfile: Dockerfile
    container_name: data-service
    restart: always
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-db:5432/datadb
      SPRING_DATASOURCE_USERNAME: admin
      SPRING_DATASOURCE_PASSWORD: admin123
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
    depends_on:
      - postgres
      - redis
    networks:
      - internal


  gateway:
    build:
      context: ./Gateway
      dockerfile: Dockerfile
    container_name: gateway
    restart: always
    ports:
      - "8080:8080"
    environment:
        SPRING_DATA_REDIS_HOST: redis
        SPRING_DATA_REDIS_PORT: 6379
        JWT_SECRET: la-clave-secreta-de-jwt-1234-con-minimo-de-32-caracteres
    depends_on:
      - auth-service
      - data-service
      - redis
    networks:
      - internal

volumes:
  postgres_data:
  redis_data:

networks:
  internal:
    internal: false